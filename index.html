<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Button Program</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f6f9;
}

.container{
    margin-top:100px;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#content{
    margin-top:20px;
    font-size:18px;
}
</style>

</head>

<body>

<div class="container">

<h1>Dynamic Webpage Example</h1>

<button onclick="changeContent()">Click Me</button>

<div id="content">
<p>Press the button to change the content.</p>
</div>

</div>

<script>

function changeContent(){
    document.getElementById("content").innerHTML =
    "<p>The content has been updated using JavaScript and DOM!</p>";
}

</script>

</body>
</html>
