<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sportec Dynamic Page</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f6f9;
}

.container{
    width:60%;
    margin:auto;
    margin-top:50px;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:5px;
    background:#007bff;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

#content{
    margin-top:20px;
    font-size:18px;
    color:#333;
}
</style>

</head>

<body>

<div class="container">

<h1>SPORTEC Dashboard</h1>

<button type="button" onclick="showEvents()">Events</button>
<button type="button" onclick="showTeam()">Core Team</button>
<button type="button" onclick="showAnnouncement()">Announcements</button>

<div id="content">
<p>Click a button to see updates.</p>
</div>

</div>

<script>

function showEvents(){
    document.getElementById("content").innerHTML = `
        <h2>Sportec Events</h2>
        <ul>
            <li>Football Tournament</li>
            <li>Basketball Championship</li>
            <li>Cricket League</li>
            <li>Table Tennis Competition</li>
        </ul>
    `;
}

function showTeam(){
    document.getElementById("content").innerHTML = `
        <h2>Core Committee</h2>
        <p>President: Rahul Sharma</p>
        <p>Vice President: Aditi Mehta</p>
        <p>Event Head: Arjun Patel</p>
    `;
}

function showAnnouncement(){
    document.getElementById("content").innerHTML = `
        <h2>Latest Announcement</h2>
        <p>Registrations for Sportec 2026 are now open!</p>
        <p>Last date to apply: 20 March 2026.</p>
    `;
}

</script>

</body>
</html>
